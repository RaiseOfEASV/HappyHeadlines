services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  draft-db:
    image: postgres:17-alpine
    container_name: draft-db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"          # host 5434 → container 5432 (avoids conflict with other DBs)
    volumes:
      - draft-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 10
      start_period: 20s
      timeout: 5s

  # ── Flyway migration ─────────────────────────────────────────────────────────
  draft-flyway:
    image: flyway/flyway:10-alpine
    container_name: draft-flyway
    env_file: .env
    command: >
      -url=jdbc:postgresql://draft-db:5432/${POSTGRES_DB}
      -user=${POSTGRES_USER}
      -password=${POSTGRES_PASSWORD}
      -connectRetries=10
      migrate
    volumes:
      - ./sql:/flyway/sql:ro
    depends_on:
      draft-db:
        condition: service_healthy

  # ── Draft API ────────────────────────────────────────────────────────────────
  draft-service:
    build:
      context: ../..
      dockerfile: apps/draft-service/Dockerfile
    container_name: draft-service
    env_file: .env
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      AppInfrastructureOptions__DbConnectionString: "Host=draft-db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      Seq__ServerUrl: "http://seq:80"
      Seq__ApiKey: ${SEQ_API_KEY}
      Otlp__Endpoint: "http://jaeger:4317"
    depends_on:
      draft-flyway:
        condition: service_completed_successfully
    networks:
      - default
      - observability
      - services

networks:
  observability:
    external: true
    name: happyheadlines-observability
  services:
    external: true
    name: happyheadlines-services

volumes:
  draft-db-data:
