services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  newsletter-db:
    image: postgres:17-alpine
    container_name: newsletter-db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5436:5432"          # host 5436 → container 5432 (avoids conflict with other DBs)
    volumes:
      - newsletter-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 10
      start_period: 20s
      timeout: 5s

  # ── Redis ────────────────────────────────────────────────────────────────────
  newsletter-redis:
    image: redis:7-alpine
    container_name: newsletter-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    env_file: .env
    ports:
      - "6380:6379"          # host 6380 → container 6379
    volumes:
      - newsletter-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      retries: 5
      timeout: 3s

  # ── Flyway migration ─────────────────────────────────────────────────────────
  newsletter-flyway:
    image: flyway/flyway:10-alpine
    container_name: newsletter-flyway
    env_file: .env
    command: >
      -url=jdbc:postgresql://newsletter-db:5432/${POSTGRES_DB}
      -user=${POSTGRES_USER}
      -password=${POSTGRES_PASSWORD}
      -connectRetries=10
      migrate
    volumes:
      - ./sql:/flyway/sql:ro
    depends_on:
      newsletter-db:
        condition: service_healthy

  # ── Newsletter API ───────────────────────────────────────────────────────────
  newsletter-service:
    build:
      context: ../..
      dockerfile: apps/newsletter-service/Dockerfile
    container_name: newsletter-service
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      AppInfrastructureOptions__DbConnectionString: "Host=newsletter-db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      AppInfrastructureOptions__RedisConnectionString: "newsletter-redis:6379,password=${REDIS_PASSWORD}"
      AppInfrastructureOptions__ArticleServiceUrl: "http://article-service:8080"
      AppInfrastructureOptions__RabbitMq__Host: "happyheadlines-rabbitmq"
      AppInfrastructureOptions__RabbitMq__Port: "5672"
      AppInfrastructureOptions__RabbitMq__Username: ${RABBITMQ_USER}
      AppInfrastructureOptions__RabbitMq__Password: ${RABBITMQ_PASSWORD}
      AppInfrastructureOptions__Smtp__Host: ${SMTP_HOST}
      AppInfrastructureOptions__Smtp__Port: ${SMTP_PORT}
      AppInfrastructureOptions__Smtp__Username: ${SMTP_USERNAME}
      AppInfrastructureOptions__Smtp__Password: ${SMTP_PASSWORD}
      Seq__ServerUrl: "http://seq:80"
      Seq__ApiKey: ${SEQ_API_KEY}
      Otlp__Endpoint: "http://jaeger:4317"
    ports:
      - "5400:8080"
    depends_on:
      newsletter-flyway:
        condition: service_completed_successfully
      newsletter-redis:
        condition: service_healthy
    networks:
      - default
      - observability
      - messaging

networks:
  observability:
    external: true
    name: happyheadlines-observability
  messaging:
    external: true
    name: happyheadlines-messaging

volumes:
  newsletter-db-data:
  newsletter-redis-data:
