services:

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  redisinsight:
    image: redis/redisinsight:latest
    ports:
      - "5540:5540"
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    ports:
      - "5200:80"
    volumes:
      - ./nginx/:/etc/nginx/conf.d/
    depends_on:
      - articles-api-1
      - articles-api-2
      - articles-api-3
    networks:
      - default
      - services
  articles-api-1: &api
    build:
      context: .
      dockerfile: src/Article.Api/Dockerfile
    expose:
      - "8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - AppInfrastructureOptions__Global=${Global}
      - AppInfrastructureOptions__Europe=${Europe}
      - AppInfrastructureOptions__Africa=${Africa}
      - AppInfrastructureOptions__Asia=${Asia}
      - AppInfrastructureOptions__Australia=${Australia}
      - AppInfrastructureOptions__SouthAmerica=${SouthAmerica}
      - AppInfrastructureOptions__NorthAmerica=${NorthAmerica}
      - AppInfrastructureOptions__Antarctica=${Antarctica}
      - AppInfrastructureOptions__Redis__ConnectionString=redis:6379
    depends_on:
      redis:
        condition: service_healthy
      article-db:
        condition: service_healthy
      flyway-global:
        condition: service_completed_successfully
      flyway-europe:
        condition: service_completed_successfully
      flyway-africa:
        condition: service_completed_successfully
      flyway-asia:
        condition: service_completed_successfully
      flyway-australia:
        condition: service_completed_successfully
      flyway-southamerica:
        condition: service_completed_successfully
      flyway-northamerica:
        condition: service_completed_successfully
      flyway-antarctica:
        condition: service_completed_successfully

  articles-api-2:
    <<: *api

  articles-api-3:
    <<: *api

  article-db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    ports:
      - "1433:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${SA_PASSWORD}
    volumes:
      - article-db-data:/var/opt/mssql
      - ./initDb/entrypoint.sh:/entrypoint.sh
      - ./initDb/InitDb.sql:/init/InitDb.sql
    entrypoint: ["bash", "/entrypoint.sh"]
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P ${SA_PASSWORD} -Q 'SELECT 1' -No -C"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  flyway-global: &flyway
    image: flyway/flyway:10
    command: migrate
    volumes:
      - ./sql/shared:/flyway/sql/shared
      - ./sql/global:/flyway/sql/global
    environment:
      FLYWAY_URL: ${AppInfrastructureOptions__Global}
      FLYWAY_USER: ${FLYWAY_USER}
      FLYWAY_PASSWORD: ${SA_PASSWORD}
      FLYWAY_SCHEMAS: dbo
      FLYWAY_CONNECT_RETRIES: 30
    depends_on:
      article-db:
        condition: service_healthy

  flyway-europe:
    <<: *flyway
    volumes:
      - ./sql/shared:/flyway/sql/shared
      - ./sql/europe:/flyway/sql/europe
    environment:
      FLYWAY_URL: ${AppInfrastructureOptions__Europe}
      FLYWAY_USER: ${FLYWAY_USER}
      FLYWAY_PASSWORD: ${SA_PASSWORD}
      FLYWAY_SCHEMAS: dbo
      FLYWAY_CONNECT_RETRIES: 30

  flyway-africa:
    <<: *flyway
    volumes:
      - ./sql/shared:/flyway/sql/shared
      - ./sql/africa:/flyway/sql/africa
    environment:
      FLYWAY_URL: ${AppInfrastructureOptions__Africa}
      FLYWAY_USER: ${FLYWAY_USER}
      FLYWAY_PASSWORD: ${SA_PASSWORD}
      FLYWAY_SCHEMAS: dbo
      FLYWAY_CONNECT_RETRIES: 30

  flyway-asia:
    <<: *flyway
    volumes:
      - ./sql/shared:/flyway/sql/shared
      - ./sql/asia:/flyway/sql/asia
    environment:
      FLYWAY_URL: ${AppInfrastructureOptions__Asia}
      FLYWAY_USER: ${FLYWAY_USER}
      FLYWAY_PASSWORD: ${SA_PASSWORD}
      FLYWAY_SCHEMAS: dbo
      FLYWAY_CONNECT_RETRIES: 30

  flyway-australia:
    <<: *flyway
    volumes:
      - ./sql/shared:/flyway/sql/shared
      - ./sql/australia:/flyway/sql/australia
    environment:
      FLYWAY_URL: ${AppInfrastructureOptions__Australia}
      FLYWAY_USER: ${FLYWAY_USER}
      FLYWAY_PASSWORD: ${SA_PASSWORD}
      FLYWAY_SCHEMAS: dbo
      FLYWAY_CONNECT_RETRIES: 30

  flyway-southamerica:
    <<: *flyway
    volumes:
      - ./sql/shared:/flyway/sql/shared
      - ./sql/southAmerica:/flyway/sql/southAmerica
    environment:
      FLYWAY_URL: ${AppInfrastructureOptions__SouthAmerica}
      FLYWAY_USER: ${FLYWAY_USER}
      FLYWAY_PASSWORD: ${SA_PASSWORD}
      FLYWAY_SCHEMAS: dbo
      FLYWAY_CONNECT_RETRIES: 30

  flyway-northamerica:
    <<: *flyway
    volumes:
      - ./sql/shared:/flyway/sql/shared
      - ./sql/northAmerica:/flyway/sql/northAmerica
    environment:
      FLYWAY_URL: ${AppInfrastructureOptions__NorthAmerica}
      FLYWAY_USER: ${FLYWAY_USER}
      FLYWAY_PASSWORD: ${SA_PASSWORD}
      FLYWAY_SCHEMAS: dbo
      FLYWAY_CONNECT_RETRIES: 30

  flyway-antarctica:
    <<: *flyway
    volumes:
      - ./sql/shared:/flyway/sql/shared
      - ./sql/antarctica:/flyway/sql/antarctica
    environment:
      FLYWAY_URL: ${AppInfrastructureOptions__Antarctica}
      FLYWAY_USER: ${FLYWAY_USER}
      FLYWAY_PASSWORD: ${SA_PASSWORD}
      FLYWAY_SCHEMAS: dbo
      FLYWAY_CONNECT_RETRIES: 30

networks:
  services:
    external: true
    name: happyheadlines-services

volumes:
  article-db-data: