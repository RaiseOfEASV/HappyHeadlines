services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  publisher-db:
    image: postgres:17-alpine
    container_name: publisher-db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5436:5432"          # host 5436 → container 5432 (avoids conflict with other DBs)
    volumes:
      - publisher-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 10
      start_period: 20s
      timeout: 5s

  # ── Flyway migration ─────────────────────────────────────────────────────────
  publisher-flyway:
    image: flyway/flyway:10-alpine
    container_name: publisher-flyway
    env_file: .env
    command: >
      -url=jdbc:postgresql://publisher-db:5432/${POSTGRES_DB}
      -user=${POSTGRES_USER}
      -password=${POSTGRES_PASSWORD}
      -connectRetries=10
      migrate
    volumes:
      - ./sql:/flyway/sql:ro
    depends_on:
      publisher-db:
        condition: service_healthy

  # ── Publisher API ────────────────────────────────────────────────────────────
  publisher-service:
    build:
      context: ../..
      dockerfile: apps/publisher-service/Dockerfile
    container_name: publisher-service
    env_file: .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      AppInfrastructureOptions__DbConnectionString: "Host=publisher-db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      AppInfrastructureOptions__DraftServiceUrl: "http://draft-service:8080"
      AppInfrastructureOptions__RabbitMq__Host: "happyheadlines-rabbitmq"
      AppInfrastructureOptions__RabbitMq__Port: "5672"
      AppInfrastructureOptions__RabbitMq__Username: ${RABBITMQ_USER}
      AppInfrastructureOptions__RabbitMq__Password: ${RABBITMQ_PASSWORD}
      Seq__ServerUrl: "http://seq:80"
      Seq__ApiKey: ${SEQ_API_KEY}
      Otlp__Endpoint: "http://jaeger:4317"
    ports:
      - "5300:8080"
    depends_on:
      publisher-flyway:
        condition: service_completed_successfully
    networks:
      - default
      - observability
      - messaging
      - services

networks:
  observability:
    external: true
    name: happyheadlines-observability
  messaging:
    external: true
    name: happyheadlines-messaging
  services:
    external: true
    name: happyheadlines-services

volumes:
  publisher-db-data:
