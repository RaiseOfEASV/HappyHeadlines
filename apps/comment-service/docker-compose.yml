services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  comment-db:
    image: postgres:17-alpine
    container_name: comment-db
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5434:5432"          # host 5434 → container 5432 (avoids conflict with other DBs)
    volumes:
      - comment-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 10
      start_period: 20s
      timeout: 5s

  # ── Flyway migration ────────────────────────────────────────────────────────
  comment-flyway:
    image: flyway/flyway:10-alpine
    container_name: comment-flyway
    env_file: .env
    command: >
      -url=jdbc:postgresql://comment-db:5432/${POSTGRES_DB}
      -user=${POSTGRES_USER}
      -password=${POSTGRES_PASSWORD}
      -connectRetries=10
      migrate
    volumes:
      - ./sql:/flyway/sql:ro
    depends_on:
      comment-db:
        condition: service_healthy

  # ── Comment API ─────────────────────────────────────────────────────────────
  comment-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: comment-api
    env_file: .env
    ports:
      - "5200:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      AppInfrastructureOptions__DbConnectionString: "Host=comment-db;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}"
      AppInfrastructureOptions__ProfanityServiceUrl: "http://host.docker.internal:5100"
    depends_on:
      comment-flyway:
        condition: service_completed_successfully

volumes:
  comment-db-data: