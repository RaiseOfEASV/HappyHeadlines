# Metrics stack – Prometheus + Grafana
#
# Usage:
#   docker compose up -d
#
# Prometheus scrapes /metrics from every service container.
# Grafana is pre-provisioned with the Prometheus datasource and cache dashboard.

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - metrics
      - services
      - observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    ports:
      - "3003:3000"
    depends_on:
      - prometheus
    networks:
      - metrics
    restart: unless-stopped

networks:
  metrics:
    name: happyheadlines-metrics
    driver: bridge
  services:
    name: happyheadlines-services
    external: true
  observability:
    name: happyheadlines-observability
    external: true

volumes:
  prometheus-data:
  grafana-data:
