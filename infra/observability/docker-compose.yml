# Centralized observability stack – run once for all services.
#
# Usage:
#   cp .env.example .env   # fill in SEQ_ADMIN_PASSWORD
#   docker compose up -d
#
# Services that want to ship logs/traces must join the shared network:
#   networks:
#     - happyheadlines-observability  (declared as external: true)
#
# They can then reach:
#   Seq    → http://seq:80       (log ingestion)
#   Jaeger → http://jaeger:4317  (OTLP gRPC trace ingestion)

services:

  # ── Seq (structured log aggregation) ────────────────────────────────────────
  seq:
    image: datalust/seq:latest
    container_name: seq
    env_file: .env
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINPASSWORD: ${SEQ_ADMIN_PASSWORD}
    ports:
      - "5341:80"            # UI → http://localhost:5341
    volumes:
      - seq-data:/data
    networks:
      - observability
    restart: unless-stopped

  # ── Jaeger (distributed tracing) ────────────────────────────────────────────
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    ports:
      - "16686:16686"        # UI   → http://localhost:16686
      - "4317:4317"          # OTLP gRPC receiver (services point here)
    networks:
      - observability
    restart: unless-stopped

  # ── Prometheus (metrics collection) ────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - observability
    restart: unless-stopped

  # ── Grafana (dashboard) ──────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_SECURITY_ADMIN_USER: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - observability
    depends_on:
      - prometheus
    restart: unless-stopped

networks:
  observability:
    name: happyheadlines-observability
    driver: bridge

volumes:
  seq-data:
  prometheus-data:
  grafana-data:
